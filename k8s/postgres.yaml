apiVersion: v1
kind: Namespace
metadata:
  name: data
---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: data
type: Opaque
stringData:
  POSTGRES_DB: innovatech
  POSTGRES_USER: appadmin
  POSTGRES_PASSWORD: "innohard"   # edit this, or recreate the secret with kubectl
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-initdb
  namespace: data
data:
  # Runs automatically the first time Postgres initialises an empty data dir.
  01-schema.sql: |
    CREATE TABLE IF NOT EXISTS employees (
        id          SERIAL PRIMARY KEY,
        name        VARCHAR(120) NOT NULL,
        email       VARCHAR(160) NOT NULL UNIQUE,
        department  VARCHAR(80)  NOT NULL,
        status      VARCHAR(20)  NOT NULL DEFAULT 'active',
        role        VARCHAR(80)  NOT NULL,
        created_at  TIMESTAMPTZ  NOT NULL DEFAULT now()
    );
    INSERT INTO employees (name, email, department, status, role) VALUES
        ('Ada Lovelace', 'ada@innovatech.example',  'Engineering', 'active', 'Developer'),
        ('Alan Turing',  'alan@innovatech.example', 'Security',    'active', 'Security Analyst')
    ON CONFLICT (email) DO NOTHING;
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: data
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: local-path   # k3s built-in default StorageClass
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: data
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16
          ports:
            - containerPort: 5432
          envFrom:
            - secretRef:
                name: postgres-secret
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
              subPath: pgdata
            - name: initdb
              mountPath: /docker-entrypoint-initdb.d
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: postgres-pvc
        - name: initdb
          configMap:
            name: postgres-initdb
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: data
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
